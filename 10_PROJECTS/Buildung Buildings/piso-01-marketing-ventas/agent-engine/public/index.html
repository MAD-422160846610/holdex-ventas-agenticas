<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCAN DASHBOARD | Holdex Sales</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; color: #00ff00; font-family: monospace; }
        .brutalist-border { border: 2px solid #00ff00; }
        .table-row-hover:hover { background-color: rgba(0, 255, 0, 0.1); }
    </style>
</head>
<body class="p-8">
    <header class="mb-12 border-b-2 border-[#00ff00] pb-4 flex justify-between items-end">
        <div>
            <h1 class="text-4xl font-bold uppercase tracking-widest">SCAN_DASHBOARD</h1>
            <p class="text-gray-400 mt-2">Holdex Group | Piso 01 Operaciones</p>
        </div>
        <div class="text-right text-sm">
            STATUS: <span class="text-[#00ff00] animate-pulse">ONLINE</span><br>
            AGENTS: SCOUT, OUTREACH
        </div>
    </header>

    <main>
        <div class="mb-6 flex justify-between items-center">
            <h2 class="text-2xl font-bold">INBOX DE LEADS (ESPERANDO SCOUT)</h2>
            <button onclick="fetchLeads()" class="px-4 py-2 border border-[#00ff00] hover:bg-[#00ff00] hover:text-black transition-colors">
                [ REFRESCAR_SISTEMA ]
            </button>
        </div>

        <div class="brutalist-border overflow-hidden">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-[#00ff00] text-black">
                        <th class="p-4 border-r border-black">ID</th>
                        <th class="p-4 border-r border-black">EMAIL</th>
                        <th class="p-4 border-r border-black">STATUS</th>
                        <th class="p-4 border-r border-black">FECHA INGRESO</th>
                        <th class="p-4">ACCIÓN (SCAN)</th>
                    </tr>
                </thead>
                <tbody id="leads-table">
                    <!-- Dinámico -->
                </tbody>
            </table>
        </div>
    </main>

    <script>
        async function fetchLeads() {
            const res = await fetch('/api/scan/leads');
            const leads = await res.json();
            const tbody = document.getElementById('leads-table');
            tbody.innerHTML = '';
            
            if (leads.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" class="p-8 text-center text-gray-500">NO HAY LEADS EN LA BANDEJA</td></tr>`;
                return;
            }

            leads.forEach(lead => {
                const tr = document.createElement('tr');
                tr.className = 'border-t border-[#00ff00]/30 table-row-hover';
                tr.innerHTML = `
                    <td class="p-4 border-r border-[#00ff00]/30">${lead.id}</td>
                    <td class="p-4 border-r border-[#00ff00]/30 font-bold">${lead.email}</td>
                    <td class="p-4 border-r border-[#00ff00]/30">
                        <span class="${lead.status === 'APPROVED' ? 'text-white' : lead.status === 'REJECTED' ? 'text-red-500' : 'text-yellow-500'}">
                            [ ${lead.status} ]
                        </span>
                    </td>
                    <td class="p-4 border-r border-[#00ff00]/30 text-sm">${new Date(lead.created_at).toLocaleString()}</td>
                    <td class="p-4 flex gap-2">
                        <button onclick="updateStatus(${lead.id}, 'APPROVED')" class="px-3 py-1 bg-[#00ff00] text-black text-xs font-bold hover:bg-white transition-colors" ${lead.status !== 'PENDING_SCOUT' ? 'disabled style="opacity:0.3"' : ''}>APROBAR</button>
                        <button onclick="updateStatus(${lead.id}, 'REJECTED')" class="px-3 py-1 border border-red-500 text-red-500 text-xs font-bold hover:bg-red-500 hover:text-black transition-colors" ${lead.status !== 'PENDING_SCOUT' ? 'disabled style="opacity:0.3"' : ''}>DESCARTAR</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        async function updateStatus(id, status) {
            if (!confirm(`¿Confirmas cambiar el lead a ${status}?`)) return;
            
            await fetch(`/api/scan/leads/${id}/status`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ status })
            });
            fetchLeads();
        }

        // Carga inicial
        fetchLeads();
    </script>
</body>
</html>
