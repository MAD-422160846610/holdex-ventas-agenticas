<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>TV PRO — Glitch Lab</title>
  <style>
    :root {
      --color-brand: #E60000;
      --color-bg: #050505;
      --ease-expo: cubic-bezier(0.19, 1, 0.22, 1);
    }

    body {
      margin: 0;
      background: var(--color-bg);
      color: white;
      font-family: 'Inter', sans-serif;
      overflow-x: hidden;
    }

    .lab-header {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 100;
      background: rgba(0,0,0,0.8);
      padding: 8px 20px;
      border-left: 3px solid var(--color-brand);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .tv-logo-svg {
      height: 22px;
      width: auto;
      fill: white;
    }

    .lab-header span {
      font-size: 0.75rem;
      letter-spacing: 1px;
      opacity: 0.7;
      text-transform: uppercase;
    }

    .reel {
      display: flex;
      flex-direction: column;
    }

    .slide {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
      box-sizing: border-box;
      perspective: 1000px;
    }

    .card {
      position: relative;
      width: 100%;
      max-width: 800px;
      height: 60vh;
      background: #111;
      border-radius: 12px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: transform 0.2s var(--ease-expo), filter 0.1s linear;
      will-change: transform, filter;
      border: 1px solid rgba(255,255,255,0.05);
      background-size: cover;
      background-position: center;
    }

    /* THE GLITCH EFFECTS */
    .glitch-text {
      font-family: 'Bebas Neue', 'Inter', sans-serif;
      font-size: clamp(4rem, 10vw, 8rem);
      font-weight: 900;
      text-transform: uppercase;
      position: relative;
      color: white;
      line-height: 1;
      letter-spacing: -0.02em;
    }

    /* RGB Split on Velocity */
    .card.is-glitching .glitch-text::before,
    .card.is-glitching .glitch-text::after {
      content: attr(data-text);
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      opacity: 0.8;
    }

    .card.is-glitching .glitch-text::before {
      color: #00ffff;
      z-index: -1;
      animation: shift-cyan 0.15s infinite;
      mix-blend-mode: screen;
    }

    .card.is-glitching .glitch-text::after {
      color: #ff00ff;
      z-index: -2;
      animation: shift-magenta 0.15s infinite;
      mix-blend-mode: screen;
    }

    @keyframes shift-cyan {
      0% { transform: translate(-3px, 2px); }
      33% { transform: translate(4px, -1px); }
      66% { transform: translate(-2px, 3px); }
      100% { transform: translate(-3px, 2px); }
    }

    @keyframes shift-magenta {
      0% { transform: translate(3px, -2px); }
      33% { transform: translate(-4px, 1px); }
      66% { transform: translate(2px, -3px); }
      100% { transform: translate(3px, -2px); }
    }

    /* Jitter and Shake (Procedural feel via steps) */
    .card.is-glitching {
      animation: shake 0.1s steps(2) infinite;
    }

    @keyframes shake {
      0% { transform: translate(2px, 1px) rotate(0.2deg); }
      50% { transform: translate(-2px, -1px) rotate(-0.2deg); }
      100% { transform: translate(1px, 2px) rotate(0.1deg); }
    }

    .instruction {
      position: fixed;
      bottom: 40px;
      width: 100%;
      text-align: center;
      color: rgba(255,255,255,0.3);
      font-size: 0.7rem;
      letter-spacing: 4px;
      text-transform: uppercase;
    }

    .grain {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 999;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      opacity: 0.08;
    }

    .scanlines {
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0,
        transparent 2px,
        rgba(0,0,0,0.1) 2px,
        rgba(0,0,0,0.1) 4px
      );
      pointer-events: none;
    }
  </style>
</head>

      <div class="card" style="background-image: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1550745165-9bc0b252723f?auto=format&fit=crop&q=80&w=1000');">

  <div class="instruction">Haz scroll rápido para inducir interferencia</div>

  <script>
    let lastY = window.scrollY;
    let t = 0;
    const cards = document.querySelectorAll('.card');

    function animate() {
      const currentY = window.scrollY;
      const velocity = Math.abs(currentY - lastY);
      
      // Decay velocity slowly for smoother visual "drag"
      const displayVelocity = velocity; 

      if (displayVelocity > 2) {
        const blur = Math.min(displayVelocity * 0.3, 20);
        const skew = Math.min(displayVelocity * 0.15, 8) * (currentY > lastY ? 1 : -1);
        const grayscale = Math.min(displayVelocity * 0.05, 1);
        
        cards.forEach(card => {
          card.style.filter = `blur(${blur}px) brightness(${1 + displayVelocity * 0.012}) grayscale(${grayscale})`;
          card.style.transform = `skewY(${skew}deg)`;
          
          if (displayVelocity > 18) {
            card.classList.add('is-glitching');
          } else {
            card.classList.remove('is-glitching');
          }
        });
      } else {
        cards.forEach(card => {
          card.style.filter = '';
          card.style.transform = '';
          card.classList.remove('is-glitching');
        });
      }

      lastY = currentY;
      requestAnimationFrame(animate);
    }

    animate();
  </script>
